<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS SMPN 1 Damai</title>
    <style>
        * { box-sizing: border-box; }
        :root { --primary: #0ea5e9; --danger: #ef4444; --text-main: #1e293b; --text-bold: #0f172a; }
        body { margin: 0; font-family: sans-serif; color: var(--text-main); background: #f4f4f9; padding: 20px 10px; display: flex; justify-content: center; }
        .glass-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; margin-bottom: 20px; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border-radius: 20px; border: none; background: #e2e8f0; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); color: white; }
        label { display: block; font-weight: bold; margin: 15px 0 5px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; outline: none; font-family: inherit;}
        textarea { height: 200px; resize: vertical; }
        .btn-main { background: var(--primary); color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-cancel { background: white; color: var(--danger); border: 2px solid var(--danger); padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; display: none; }
        .news-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e2e8f0;}
    </style>
</head>
<body>
    <div id="login-screen" class="glass-card" style="max-width: 350px; text-align: center; margin-top: 10vh;">
        <h2>Login CMS</h2>
        <input type="text" id="username" placeholder="Username" style="margin-bottom: 10px;">
        <input type="password" id="password" placeholder="Password">
        <button onclick="doLogin()" class="btn-main">Login</button>
    </div>

    <div id="dashboard-screen" class="glass-card" style="display: none;">
        <div class="header"><h2>Portal Admin</h2><button onclick="logout()" style="background:var(--danger);color:white;border:none;padding:8px 15px;border-radius:10px;cursor:pointer;">Logout</button></div>
        
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-tulis" onclick="switchTab('tulis')">✏️ Berita</button>
            <button class="tab-btn" id="tab-pengaturan" onclick="switchTab('pengaturan')">⚙️ Pengaturan</button>
            <button class="tab-btn" id="tab-daftar" onclick="switchTab('daftar')">📋 Daftar Berita</button>
        </div>

        <div id="area-tulis">
            <input type="hidden" id="edit-sha"><input type="hidden" id="edit-path"><input type="hidden" id="old-image-path"><input type="hidden" id="delete-image-path">
            <label>Tanggal</label><input type="date" id="date">
            <label>Judul</label><input type="text" id="title">
            <label>Foto (Bisa pilih > 1)</label><input type="file" id="image" accept="image/*" multiple>
            <label>Isi</label><textarea id="body"></textarea>
            
            <button onclick="publish()" id="btnPublish" class="btn-main">Terbitkan Berita</button>
            <button onclick="batalEdit()" id="btnCancelEdit" class="btn-cancel">Batal Edit</button>
            <div id="msg" style="text-align: center; margin-top: 10px; color: var(--primary); font-weight: bold;"></div>
        </div>

        <div id="area-pengaturan" style="display: none;">
            <input type="hidden" id="settings-sha">
            <label>Teks Profil Sekolah</label><textarea id="set-profil" style="height: 100px;"></textarea>
            <label>Visi Sekolah</label><textarea id="set-visi" style="height: 80px;"></textarea>
            <label>Misi Sekolah</label><textarea id="set-misi" style="height: 120px;"></textarea>
            <label>Alamat Google Maps</label><input type="text" id="set-alamat">
            <label>Email</label><input type="text" id="set-email">
            <label>Instagram</label><input type="text" id="set-ig">
            <label>Link Facebook</label><input type="text" id="set-fb" placeholder="https://facebook.com/smpn1damai">
            <label>Link YouTube</label><input type="text" id="set-yt" placeholder="https://youtube.com/@smpn1damai">
            <button onclick="saveSettings()" id="btnSaveSettings" class="btn-main">Simpan Pengaturan</button>
        </div>

        <div id="area-daftar" style="display: none;"><div id="list-container">Memuat...</div></div>
    </div>

    <script>
        window.onload = () => { if (sessionStorage.getItem('cms_user')) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('dashboard-screen').style.display = 'block'; resetForm(); } };
        function switchTab(t) { ['tulis', 'pengaturan', 'daftar'].forEach(x => { document.getElementById('area-'+x).style.display = 'none'; document.getElementById('tab-'+x).classList.remove('active'); }); document.getElementById('area-'+t).style.display = 'block'; document.getElementById('tab-'+t).classList.add('active'); if(t==='daftar') loadList(); if(t==='pengaturan') loadSettings(); }
        async function doLogin() { const u=document.getElementById('username').value, p=document.getElementById('password').value; const r = await fetch('/api/login', {method:'POST', body:JSON.stringify({username:u, password:p}), headers:{'Content-Type':'application/json'}}); const d = await r.json(); if(d.success) { sessionStorage.setItem('cms_user', u); sessionStorage.setItem('cms_pass', p); location.reload(); } else alert('Gagal!'); }
        function logout() { sessionStorage.clear(); location.reload(); }
        
        function resetForm() {
            document.getElementById('title').value=''; document.getElementById('body').value=''; document.getElementById('image').value='';
            document.getElementById('edit-sha').value=''; document.getElementById('edit-path').value=''; document.getElementById('old-image-path').value=''; document.getElementById('delete-image-path').value='';
            document.getElementById('btnPublish').innerText = 'Terbitkan Berita Baru'; document.getElementById('btnCancelEdit').style.display = 'none';
            document.getElementById('date').value = new Date().toLocaleDateString('en-CA');
        }
        function batalEdit() { if(confirm("Batal edit?")) resetForm(); }

        async function loadSettings() {
            const r = await fetch('/api/settings'); const d = await r.json();
            ['profil','visi','misi','alamat','email','ig','fb','yt'].forEach(k => document.getElementById('set-'+k).value = d[k] || '');
            document.getElementById('settings-sha').value = d.sha || '';
        }
        async function saveSettings() {
            const s = { profil:document.getElementById('set-profil').value, visi:document.getElementById('set-visi').value, misi:document.getElementById('set-misi').value, alamat:document.getElementById('set-alamat').value, email:document.getElementById('set-email').value, ig:document.getElementById('set-ig').value, fb:document.getElementById('set-fb').value, yt:document.getElementById('set-yt').value };
            await fetch('/api/settings', {method:'POST', body:JSON.stringify({username:sessionStorage.getItem('cms_user'), password:sessionStorage.getItem('cms_pass'), settings:s, sha:document.getElementById('settings-sha').value}), headers:{'Content-Type':'application/json'}});
            alert("Tersimpan!"); loadSettings();
        }

        async function loadList() {
            const r = await fetch('/api/list'); const d = await r.json();
            let h = ''; d.filter(f=>f.name.endsWith('.md')).reverse().forEach(f => h += `<div class="news-item"><b>${f.name.replace('.md','')}</b> <div><button onclick="editFile('${f.path}','${f.sha}')">Edit</button> <button style="color:red" onclick="deleteFile('${f.path}','${f.sha}')">Hapus</button></div></div>`);
            document.getElementById('list-container').innerHTML = h;
        }
        async function deleteFile(p,s) { if(confirm('Hapus?')) { await fetch('/api/delete', {method:'POST', body:JSON.stringify({username:sessionStorage.getItem('cms_user'), password:sessionStorage.getItem('cms_pass'), path:p, sha:s}), headers:{'Content-Type':'application/json'}}); loadList(); } }
        
        async function editFile(p,s) {
            const r = await fetch(`/api/detail?path=${encodeURIComponent(p)}`); const d = await r.json();
            const raw = decodeURIComponent(escape(window.atob(d.content)));
            document.getElementById('title').value = (raw.match(/title:\s*"(.*?)"/) || [])[1] || '';
            document.getElementById('date').value = (raw.match(/date:\s*"(.*?)"/) || [])[1] || new Date().toLocaleDateString('en-CA');
            document.getElementById('old-image-path').value = (raw.match(/thumbnail:\s*"(.*?)"/) || [])[1] || '';
            document.getElementById('body').value = raw.replace(/---[\s\S]*?---/, '').trim();
            document.getElementById('edit-sha').value = s; document.getElementById('edit-path').value = p;
            document.getElementById('btnPublish').innerText = 'Simpan Perubahan'; document.getElementById('btnCancelEdit').style.display = 'block'; switchTab('tulis');
        }

        function compress(file) {
            return new Promise(r => {
                const rd = new FileReader(); rd.readAsDataURL(file);
                rd.onload = e => { const img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        const cvs = document.createElement('canvas'); let w = img.width, h = img.height;
                        if(w > 1200) { h = Math.round(h*1200/w); w = 1200; }
                        cvs.width = w; cvs.height = h; cvs.getContext('2d').drawImage(img,0,0,w,h);
                        r(cvs.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        async function publish() {
            const m = document.getElementById('msg'); m.innerText = "Memproses...";
            let imgs = []; const files = document.getElementById('image').files;
            for(let i=0; i<files.length; i++) { imgs.push({ base64: await compress(files[i]), name: files[i].name }); }
            
            const payload = { username: sessionStorage.getItem('cms_user'), password: sessionStorage.getItem('cms_pass'), title: document.getElementById('title').value, body: document.getElementById('body').value, date: document.getElementById('date').value, images: imgs, updateSha: document.getElementById('edit-sha').value, updatePath: document.getElementById('edit-path').value, oldImage: document.getElementById('old-image-path').value };
            
            const res = await fetch('/api/publish', { method:'POST', body:JSON.stringify(payload), headers:{'Content-Type':'application/json'}});
            if(res.ok) { alert("Sukses!"); resetForm(); switchTab('daftar'); m.innerText = ""; } else { alert("Gagal!"); m.innerText = ""; }
        }
    </script>
</body>
</html>
